services:
  - type: web
    name: eventsphere-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build && npx prisma generate
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: eventsphere_rqu0
          property: connectionString
      - key: PORT
        value: 3000
